<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transmission Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    font-size: 15px;
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 30px 16px;
  }

  #app {
    background: #fff;
    width: 100%;
    max-width: 720px;
    border: 1px solid #aaa;
    padding: 28px 32px;
  }

  h1 {
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 12px;
    color: #555;
    margin-bottom: 24px;
  }

  #start-screen label {
    display: block;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .radio-group {
    display: flex;
    gap: 24px;
    margin-bottom: 24px;
  }

  .radio-group label {
    font-weight: normal;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 15px;
  }

  .radio-group input[type=radio] {
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  #progress-bar-wrap {
    height: 6px;
    background: #ddd;
    margin-bottom: 18px;
  }

  #progress-bar {
    height: 6px;
    background: #333;
    transition: width 0.2s;
  }

  #question-counter {
    font-size: 12px;
    color: #666;
    margin-bottom: 10px;
  }

  #question-text {
    font-weight: bold;
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .choice {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border: 1px solid #ccc;
    margin-bottom: 8px;
    cursor: pointer;
    line-height: 1.4;
    user-select: none;
  }

  .choice:hover { background: #f5f5f5; }
  .choice.selected { background: #e0e0e0; border-color: #888; }
  .choice.correct  { background: #d4edda; border-color: #5a9a6a; }
  .choice.wrong    { background: #f8d7da; border-color: #a05050; }

  .choice input[type=radio] {
    margin-top: 2px;
    flex-shrink: 0;
    width: 15px;
    height: 15px;
    cursor: pointer;
  }

  #feedback {
    font-size: 13px;
    font-weight: bold;
    margin: 10px 0 16px;
    min-height: 18px;
  }

  #feedback.correct { color: #2a7a3a; }
  #feedback.wrong   { color: #8a2020; }

  button {
    font-family: Arial, sans-serif;
    font-size: 14px;
    padding: 9px 22px;
    cursor: pointer;
    border: 1px solid #555;
    background: #fff;
    letter-spacing: 0.5px;
  }

  button:hover { background: #ececec; }
  button.primary { background: #222; color: #fff; border-color: #222; }
  button.primary:hover { background: #444; }
  button:disabled { opacity: 0.4; cursor: default; }

  #btn-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
  }

  #result-score {
    font-size: 52px;
    font-weight: bold;
    text-align: center;
    margin: 16px 0 4px;
  }

  #result-label {
    text-align: center;
    font-size: 13px;
    margin-bottom: 24px;
  }

  #result-detail {
    font-size: 13px;
    color: #333;
    text-align: center;
    margin-bottom: 28px;
  }

  #result-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  hr { border: none; border-top: 1px solid #ddd; margin: 20px 0; }
</style>
</head>
<body>
<div id="app">

  <div id="start-screen">
    <h1>Transmission Quiz</h1>
    <p class="subtitle">Automatic &amp; Manual Transmission · Electrical Diagnosis · Driveline · 4WD &amp; AWD</p>
    <hr>
    <label>Select quiz length:</label>
    <div class="radio-group">
      <label><input type="radio" name="qlength" value="25" checked> 25 Questions</label>
      <label><input type="radio" name="qlength" value="50"> 50 Questions</label>
    </div>
    <button class="primary" onclick="startQuiz()">Start Quiz</button>
  </div>

  <div id="quiz-screen" style="display:none">
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="question-counter"></div>
    <div id="question-text"></div>
    <div id="choices"></div>
    <div id="feedback"></div>
    <div id="btn-row">
      <button class="primary" id="btn-next" disabled>Next</button>
    </div>
  </div>

  <div id="results-screen" style="display:none">
    <h1>Quiz Complete</h1>
    <hr>
    <div id="result-score"></div>
    <div id="result-label"></div>
    <div id="result-detail"></div>
    <div id="result-buttons">
      <button onclick="retakeQuiz()">Retake Same Length</button>
      <button onclick="goHome()">Change Quiz Length</button>
    </div>
  </div>

</div>

// APP
// =============================================================================
let quizLength=25, questions=[], current=0, correct=0, answered=false, selectedIdx=null;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function show(id){
  ['start-screen','quiz-screen','results-screen'].forEach(s=>{
    document.getElementById(s).style.display=(s===id)?'block':'none';
  });
}

function startQuiz(){
  quizLength=parseInt(document.querySelector('input[name="qlength"]:checked').value);
  questions=shuffle([...BANK]).slice(0,quizLength);
  current=0; correct=0;
  show('quiz-screen');
  renderQuestion();
}

function renderQuestion(){
  answered=false; selectedIdx=null;
  const q=questions[current];
  document.getElementById('progress-bar').style.width=(current/quizLength*100)+'%';
  document.getElementById('question-counter').textContent=`Question ${current+1} of ${quizLength}`;
  document.getElementById('question-text').textContent=q.q;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='';
  const btn=document.getElementById('btn-next');
  btn.disabled=true; btn.textContent='Next'; btn.onclick=nextQuestion;
  const cd=document.getElementById('choices');
  cd.innerHTML='';
  q.choices.forEach((text,i)=>{
    const div=document.createElement('div');
    div.className='choice';
    div.innerHTML=`<input type="radio" name="choice" value="${i}"> <span>${text}</span>`;
    div.addEventListener('click',()=>selectChoice(i));
    cd.appendChild(div);
  });
}

function selectChoice(i){
  if(answered)return;
  selectedIdx=i;
  document.querySelectorAll('.choice').forEach((el,idx)=>{
    el.classList.toggle('selected',idx===i);
    el.querySelector('input').checked=(idx===i);
  });
  document.getElementById('btn-next').disabled=false;
}

function nextQuestion(){
  if(selectedIdx===null)return;
  const q=questions[current];
  const ok=selectedIdx===q.answer;
  if(ok)correct++;
  answered=true;
  document.querySelectorAll('.choice').forEach((el,idx)=>{
    if(idx===q.answer)el.classList.add('correct');
    if(idx===selectedIdx&&!ok)el.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  fb.textContent=ok?'Correct':`Incorrect — correct answer: ${q.choices[q.answer].substring(0,2)}`;
  fb.className=ok?'correct':'wrong';
  const btn=document.getElementById('btn-next');
  btn.textContent=(current+1>=quizLength)?'See Results':'Next';
  btn.onclick=advance;
}

function advance(){
  current++;
  if(current>=quizLength)showResults();
  else renderQuestion();
}

function showResults(){
  show('results-screen');
  const pct=Math.round(correct/quizLength*100);
  const pass=pct>=70;
  document.getElementById('result-score').textContent=pct+'%';
  document.getElementById('result-label').textContent=pass?'✓  Pass':'✗  Did Not Pass';
  document.getElementById('result-label').style.color=pass?'#2a7a3a':'#8a2020';
  document.getElementById('result-detail').textContent=
    `${correct} correct out of ${quizLength} questions   |   Passing score: 70%`;
}

function retakeQuiz(){startQuiz();}
function goHome(){show('start-screen');}

document.getElementById('btn-next').onclick=nextQuestion;
</script>
</body>
</html>
